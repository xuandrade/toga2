<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>TOGA Blocker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 260px;
    background: #0D0B1A;
    color: white;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    padding: 16px 18px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-icon { font-size: 22px; }
  .header-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: white;
  }
  .header-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    margin-top: 1px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    border: 1px solid;
    margin-left: auto;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    animation: dot-pulse 1.8s ease-in-out infinite;
  }
  @keyframes dot-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .body { padding: 14px 18px; }

  .timer-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    margin-bottom: 12px;
  }
  .timer-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 5px;
  }
  .timer-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 11.5px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: rgba(255,255,255,0.4); font-weight: 500; }
  .info-val { color: white; font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  .footer {
    padding: 10px 18px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .btn {
    width: 100%;
    padding: 9px;
    border-radius: 9px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 150ms;
  }
  .btn-stop {
    background: rgba(232,93,93,0.15);
    border: 1px solid rgba(232,93,93,0.3);
    color: #E85D5D;
  }
  .btn-stop:hover { background: rgba(232,93,93,0.25); }
  .btn-inactive {
    background: rgba(91,71,184,0.12);
    border: 1px solid rgba(91,71,184,0.25);
    color: rgba(255,255,255,0.4);
    cursor: default;
  }

  .inactive-msg {
    text-align: center;
    padding: 20px 0 8px;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    line-height: 1.5;
  }
  .inactive-msg strong { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="header">
  <span class="header-icon">🛡</span>
  <div>
    <div class="header-title">TOGA Blocker</div>
    <div class="header-sub">MODO BLINDADO</div>
  </div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">INATIVO</span>
  </div>
</div>

<div class="body" id="bodyContent">
  <div class="inactive-msg">
    Nenhuma sessão ativa.<br/>
    Inicie o <strong>🛡 Blindado</strong> no TOGA.
  </div>
</div>

<div class="footer">
  <button class="btn btn-inactive" id="actionBtn" disabled>Nenhuma sessão ativa</button>
</div>

<script src="popup.js"></script>
</body>
</html>
